{% load static %}

<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">

    <title>InkbyJord | Private Tattoo Studio</title>

    <link rel="stylesheet" href="{% static 'css/style.css' %}">
    <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@500;600&family=Inter:wght@300;400;500&display=swap" rel="stylesheet">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@300;400;500;600&family=Manrope:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>

<body>

    <nav class="navbar navbar-expand-lg navbar-light bg-light">
        <div class="container-fluid">

            <a class="navbar-brand" href="{% url 'home' %}">
                INKBYJORD | Private Tattoo Studio
            </a>

            <button class="navbar-toggler" type="button"
                    data-bs-toggle="collapse"
                    data-bs-target="#navbarNav">
                <span class="navbar-toggler-icon"></span>
            </button>

            <div class="collapse navbar-collapse" id="navbarNav">
                <div class="navbar-nav ms-auto text-end">
                    <a class="nav-link mx-lg-3" href="{% url 'home' %}">Home</a>
                    <a class="nav-link mx-lg-3" href="{% url 'gallery' %}">Portfolio</a>
                    <a class="nav-link mx-lg-3" href="{% url 'contact' %}">Enquiries</a>
                </div>
            </div>

        </div>
    </nav>

    {% block content %}
    {% endblock %}

    <footer class="container text-center">
        <div class="footer-content">
            <h3>InkbyJord</h3>
            <p>Private Tattoo Studio • Carrigtwohill, Co. Cork</p>
            <p>Custom Designs • Graphic Realism • Saturated Realism</p>
        </div>
    </footer>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    
</body>
</html>
